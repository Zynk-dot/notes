<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Summarizer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="overlay" id="overlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <h2>Settings</h2>
            <button id="toggle-theme-btn">Toggle Theme</button>
            <button id="toggle-console-btn">Show Console</button>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>Text Summarizer</h1>
            <div class="top-bar">
                <img src="gear-icon.png" id="settings-btn" alt="Settings" class="icon">
                <a href="https://github.com/Zynk-dot/notes" target="_blank">
                    <img src="github-icon.png" alt="GitHub" class="icon">
                </a>
            </div>
        </header>
        <div class="button-row">
            <button id="bulletpoint-btn">Bulletpoint</button>
            <button id="summarize-btn">Summarizing</button>
        </div>
        <div class="content">
            <textarea id="input-box" placeholder="Enter your text here..."></textarea>
            <textarea id="output-box" placeholder="Summary will appear here..." readonly></textarea>
        </div>
        <div class="console hidden" id="console">
            <h3>Console Log</h3>
            <pre id="console-output">No logs yet.</pre>
        </div>
        <footer>
            <p>© Zynk-dot. All rights reserved.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
